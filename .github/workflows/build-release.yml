name: Build macOS Installer

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: ./scripts/build_dmg.sh

      - name: Generate checksum
        run: shasum -a 256 build/Release/MailStrea.dmg > build/Release/MailStrea.dmg.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MailStrea-${{ github.sha }}
          path: |
            build/Release/MailStrea.dmg
            build/Release/MailStrea.dmg.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Update rolling preview release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/github/publish_latest_preview.sh

      - name: Publish GitHub Release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            build/Release/MailStrea.dmg
            build/Release/MailStrea.dmg.sha256
          generate_release_notes: true
